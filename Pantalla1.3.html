<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pantalla 1.3</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e9e9e9;
        }

        .contenedor {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            background-color: #f4f4f4;
            padding: 150px 50px;
            position: relative;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        /* Marca de agua */
        .marca-agua {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: #c7b58b;
            opacity: 0.2;
            font-weight: bold;
            pointer-events: none;
        }


        .formulario {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .columna {
            width: 45%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        input {
            padding: 12px;
            border-radius: 5px;
            border: 2px solid #888;
            font-size: 14px;
            background-color: #f2f2f2;
        }

        input:focus {
            outline: none;
            border-color: #c7b58b;
        }

        h2 {
            margin-left: 20px;
            font-weight: normal;
            color: #555;
        }
    </style>
</head>
<body>

    <h2>Modificar Perfil</h2>

    <div class="contenedor">

        <div class="marca-agua"><img src="logo.png" alt="Libruarys Logo"></div>
        <div class="linea"></div>

        <form class="formulario">
            
            <div class="columna">
                <input type="text" placeholder="Nuevo nombre del usuario">
                <input type="email" placeholder="Nuevo Correo">
                <input type="password" placeholder="Anterior Contraseña">
            </div>

            <div class="columna">
                <input type="password" placeholder="Nueva Contraseña">
                <input type="password" placeholder="Repetir Nueva Contraseña">
            </div>

        </form>

    </div>

</body>
</html>
